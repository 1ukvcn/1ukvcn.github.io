info:
  title: 1ukvcn's Blog
  subtitle: 平安喜樂 順遂無憂
  author: 1ukvcn
  url: https://1ukvcn.github.io

defaults:
  favicon: /images/favicon.svg
  avatar: /images/avatar.jpg


colors:
  primary: "#f5b301"
  default_mode: light

global:
  content_max_width: 1040px
  sidebar_width: 230px
  single_page: true

  hover:
    shadow: true
    scale: false

  scroll_progress:
    bar: false
    percentage: true

  website_counter:
    url: https://cn.vercount.one/js
    enable: true
    site_pv: true
    site_uv: true
    post_pv: true

  preloader:
    enable: false

  side_tools:
    gear_rotation: true
    auto_expand: false

  open_graph:
    enable: true
    image: /images/og.svg
    description: 这里是 1ukvcn 的个人博客，记录技术、学习、网络安全和生活。

  google_analytics:
    enable: false

home_banner:
  enable: true
  style: fixed
  image:
    light: /images/banner-light.svg
    dark: /images/banner-dark.svg
  title: 平安喜樂 順遂無憂
  subtitle:
    text:
      - 记录技术、学习和生活
      - Keep building. Keep curious.
      - 一点点变强，一点点靠近答案
    hitokoto:
      enable: false
      show_author: false
    typing_speed: 100
    backing_speed: 70
    starting_delay: 500
    backing_delay: 1500
    loop: true
    smart_backspace: true
  text_color:
    light: "#ffffff"
    dark: "#f5f5dc"
  text_style:
    title_size: 2.8rem
    subtitle_size: 1.35rem
    line_height: 1.25
  social_links:
    enable: false

navbar:
  auto_hide: false
  links:
    Home:
      path: /
      icon: fa-regular fa-house
    归档:
      path: /archives/
      icon: fa-solid fa-box-archive
    标签:
      path: /tags/
      icon: fa-solid fa-tags
    分类:
      path: /categories/
      icon: fa-solid fa-folder
    访客地图:
      path: /visitors/
      icon: fa-solid fa-earth-asia
    关于:
      path: /about/
      icon: fa-regular fa-user
  search:
    enable: true
    preload: true

home:
  sidebar:
    enable: true
    position: left
    first_item: info
    announcement: 欢迎来到 1ukvcn 的博客。这里记录技术、学习和生活。
    show_on_mobile: true
    links:
      归档:
        path: /archives/
        icon: fa-solid fa-box-archive
      标签:
        path: /tags/
        icon: fa-solid fa-tags
      分类:
        path: /categories/
        icon: fa-solid fa-folder
      访客地图:
        path: /visitors/
        icon: fa-solid fa-earth-asia

  article_date_format: auto
  excerpt_length: 180

  categories:
    enable: true
    limit: 5

  tags:
    enable: true
    limit: 8

articles:
  style:
    font_size: 16px
    line_height: 1.85
    image_border_radius: 14px
    image_alignment: center
    image_caption: false
    link_icon: true
    title_alignment: left

  word_count:
    enable: true
    count: true
    min2read: true

  author_label:
    enable: true
    auto: false
    list:
      - 1ukvcn

  code_block:
    copy: true
    style: mac
    highlight_theme:
      light: github
      dark: vs2015

  toc:
    enable: true
    max_depth: 3
    number: false
    expand: true
    init_open: true

  copyright:
    enable: true
    default: cc_by_nc_sa

  lazyload: true
  pangu_js: false

comment:
  enable: false

footer:
  runtime: true
  icon: '<i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 0.5s; color: #f54545"></i>'
  start: 2026/05/29 16:30:00
  statistics: true
  customize: Powered by Hexo & Redefine. Built by 1ukvcn.
  icp:
    enable: false

plugins:
  feed:
    enable: true
  mermaid:
    enable: false

page_templates:
  friends_column: 2
  tags_style: blur
  masonry:
    batch_size: 12
    initial_batch_size: 24

cdn:
  enable: false

developer:
  enable: false
